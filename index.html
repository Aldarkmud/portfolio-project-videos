<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Project Demos</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0a100d;
      --card: #111916;
      --border: #1f2e28;
      --text: #e8f5ef;
      --muted: #8aa89a;
      --accent: #10b981;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.25rem 3rem;
    }
    h1 {
      font-size: 1.75rem;
      margin: 0 0 0.5rem;
    }
    .lead {
      color: var(--muted);
      margin: 0 0 2rem;
      font-size: 0.95rem;
    }
    .lead a { color: var(--accent); }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }
    .card h2 {
      margin: 0 0 0.75rem;
      font-size: 1.1rem;
    }
    video {
      width: 100%;
      border-radius: 8px;
      background: #000;
      display: block;
    }
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 0.75rem;
      font-size: 0.85rem;
    }
    .links a {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Portfolio Project Demos</h1>
    <p class="lead">
      GitHub file browser cannot preview MP4 files. This page plays them directly.
      Part of <a href="https://github.com/Aldarkmud/portfolio">Alex Portfolio</a>.
    </p>

    <article class="card" id="demo-1">
      <h2>Single-page landing</h2>
      <video controls playsinline preload="metadata" poster="">
        <source src="./1-demo.mp4" type="video/mp4">
      </video>
      <div class="links">
        <a href="./1-demo.mp4">Download MP4</a>
      </div>
    </article>

    <article class="card" id="demo-2">
      <h2>Secure Contact Form + Anti-Spam</h2>
      <video controls playsinline preload="metadata">
        <source src="./2-demo.mp4" type="video/mp4">
      </video>
      <div class="links">
        <a href="./2-demo.mp4">Download MP4</a>
      </div>
    </article>

    <article class="card" id="demo-3">
      <h2>Admin Panel</h2>
      <video controls playsinline preload="metadata">
        <source src="./3-demo.mp4" type="video/mp4">
      </video>
      <div class="links">
        <a href="./3-demo.mp4">Download MP4</a>
      </div>
    </article>
  </main>
</body>
</html>
